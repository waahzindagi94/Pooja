<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Forever ❤️</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffe3ec, #fff5f8);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 15px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    position: relative;
    animation: fadeIn 0.8s ease;
}

h1 {
    font-size: 22px;
}

h2 {
    font-size: 18px;
}

p {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
}

button {
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    margin: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.primary {
    background: #ff4d6d;
    color: white;
}

#noBtn {
    background: #999;
    color: white;
}

img {
    width: 100%;
    max-width: 250px;
    border-radius: 15px;
    margin: 15px auto;
    display: block;
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.95);}
    to {opacity:1; transform:scale(1);}
}

/* Extra small phones */
@media (max-width: 380px) {
    h1 { font-size: 20px; }
    h2 { font-size: 16px; }
    button { font-size: 14px; padding: 10px 18px; }
}
</style>
</head>

<body>

<div class="box fade" id="mainBox">
    <h1>Happy Birthday My Love❤️🎂</h1>
    <img src="pic1.jpg">
    <p>Before gifts… before cake… I made something only for you.</p>
    <button class="primary" onclick="startStory()">Open It 💌</button>
</div>

<script>

function smoothChange(content) {
    const box = document.getElementById("mainBox");
    box.classList.remove("fade");
    setTimeout(() => {
        box.innerHTML = content;
        box.classList.add("fade");
    }, 300);
}

function startStory() {
    smoothChange(`
        <h2>Some birthdays are special…</h2>
        <img src="pic2.jpg">
        <p>
        But yours is my favorite.  
        Because the world got you…  
        and somehow, I got lucky enough to have you.
        </p>
        <button class="primary" onclick="nextPart()">Continue ❤️</button>
    `);
}

function nextPart() {
    smoothChange(`
        <h2>Somewhere between our talks…</h2>
        <img src="pic4.png">
        <p>
        Between your smile…  
        your strength…  
        and your soft heart…  
        you became my peace, my comfort, my home.
        </p>
        <button class="primary" onclick="finalQuestion()">One Last Thing 💖</button>
    `);
}

let noClickCount = 0;

function finalQuestion() {
    smoothChange(`
        <img src="pic3.jpg">
        <h2>On your birthday… 💫</h2>
        <h1>Will you be mine… forever? 💍❤️</h1>
        <div>
            <button class="primary" onclick="celebrate()">YES 💖</button>
            <button id="noBtn" onclick="handleNo()">NO</button>
        </div>
    `);
}

function handleNo() {
    noClickCount++;
    const noBtn = document.getElementById("noBtn");

    if (noClickCount >= 2) {
        noBtn.style.position = "absolute";
        noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
        noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
    }
}

function celebrate() {
    document.body.innerHTML = `
        <div class="fade" style="text-align:center;padding:40px;">
            <h1 style="color:#d6336c;">
            Today you didn’t just say YES…  
            you chose me.  
            You chose us.  
            And I promise, every birthday from now on,  
            I’ll make you feel this loved… and more. ❤️
            </h1>
            <img src="pic5.jpg">
            <h2 style="margin-top:20px;">
            This isn’t just the best birthday decision…  
            It’s the beginning of our forever. 💍✨
            </h2>
        </div>
    `;

    setInterval(() => {
        const yes = document.createElement("div");
        yes.classList.add("yesRain");
        yes.innerHTML = "YES 💖";
        yes.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(yes);
        setTimeout(() => yes.remove(), 3000);
    }, 150);
}

</script>

</body>
</html>
